[platformio]
default_envs = native
test_dir = test/native

[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -DENABLE_STORAGE
    -DENABLE_ARRANGER
    -DENABLE_TIME_SIGNATURE
    -DENABLE_SCALES
    -Itest/native/stubs
    -Iinclude
lib_deps =
    symlink://../saveloadlib
